version: '1.0'
name: master-pipeline
displayName: MasterPipeline
stages:
  - stage: 
    name: build
    displayName: 构建
    steps:
      - step: build@frontend
        name: build_frontend
        displayName: 前端静态页面构建
        # 前端项目不需要安装依赖，直接构建
        commands:
          - echo "前端静态页面，无需构建"
          - ls -la
      - step: publish@general_artifacts
        name: publish_general_artifacts
        displayName: 上传制品
        dependArtifact: BUILD_ARTIFACT
        artifactName: output
        dependsOn: build_frontend
  - stage: 
    name: release
    displayName: 发布
    steps:
      - step: publish@release_artifacts
        name: publish_release_artifacts
        displayName: '发布'
        dependArtifact: output
        version: '1.0.0.0'
        autoIncrement: true
triggers:
  push:
    branches:
      include:
        - master